<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ARENCON — Organization Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ac:#9C2742;--ac2:#7d1f35;--bg:#f5f4f1;--card:#fff;--border:#ddd;--txt:#1a1a1a;--txt2:#6b6560;--txt3:#9e9890;--shadow:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.07);--r:8px;--red:#c0392b;--blue:#1a5fb4;--green:#2d6b22;--amber:#b8860b;--lc:#555;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow:hidden;}
.hdr{background:var(--ac);color:#fff;padding:0 16px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(156,39,66,.3);}
.hdr-in{max-width:1800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:46px;}
.hdr-l{display:flex;align-items:center;gap:10px;}.hdr-logo{height:26px;background:#fff;padding:2px 4px;border-radius:4px;}
.hdr-t{font-size:13px;font-weight:600;opacity:.9;}.hdr-r{display:flex;gap:3px;flex-wrap:wrap;}
.hb{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:3px 8px;border-radius:4px;font-family:inherit;font-size:9px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
.hb:hover{background:rgba(255,255,255,.25);}.hb.on{background:rgba(255,255,255,.35);}
.hb svg{width:11px;height:11px;}
.eo{display:none!important;}body.em .eo{display:inline-flex!important;}body.em .vo{display:none!important;}
.app{display:flex;height:calc(100vh - 46px);}
.esb{width:0;overflow:hidden;transition:width .25s;background:var(--card);border-right:1px solid var(--border);flex-shrink:0;}
body.em .esb{width:200px;}
.esb-in{width:200px;padding:8px 6px;overflow-y:auto;height:100%;}
.esb h4{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--ac);margin:8px 0 4px;padding-bottom:3px;border-bottom:2px solid var(--ac);}
.esb-btn{display:flex;align-items:center;gap:4px;width:100%;padding:4px 5px;border:1px solid var(--border);border-radius:4px;background:var(--card);font-family:inherit;font-size:10px;font-weight:600;color:var(--txt);cursor:pointer;margin-bottom:4px;}
.esb-btn:hover{border-color:var(--ac);}
.esb-btn svg{width:10px;height:10px;color:var(--ac);}
.eti{display:flex;align-items:center;padding:4px 6px;border-radius:3px;margin-bottom:3px;font-size:9px;font-weight:700;color:#fff;gap:2px;}
.eti .ea{margin-left:auto;display:flex;gap:1px;}
.eti .ea button{background:rgba(255,255,255,.3);border:none;color:#fff;width:16px;height:16px;border-radius:2px;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;}
.chart{flex:1;overflow:auto;padding:0;position:relative;}
.bp{width:0;overflow:hidden;transition:width .25s;background:var(--card);border-left:1px solid var(--border);flex-shrink:0;z-index:50;}
.bp.open{width:320px;}.bp-in{width:320px;padding:12px;overflow-y:auto;height:100%;position:relative;}
.bp-x{position:sticky;top:0;z-index:5;display:flex;justify-content:flex-end;margin-bottom:4px;}
.bp-x button{width:28px;height:28px;border-radius:50%;border:2px solid var(--ac);background:var(--card);cursor:pointer;font-size:15px;font-weight:700;color:var(--ac);display:flex;align-items:center;justify-content:center;}
.bp-x button:hover{background:var(--red);color:#fff;border-color:var(--red);}
.corp-area{display:flex;flex-direction:column;align-items:center;padding:10px 16px 4px;background:var(--card);border-bottom:1px solid var(--border);}
.corp-row{display:flex;gap:8px;align-items:flex-end;justify-content:center;margin-bottom:2px;}
.ccb{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:10px 28px;text-align:center;box-shadow:var(--shadow);}
.ccb.primary{border-color:var(--ac);}.ccb.parent{background:#fafaf8;}.ccb.sister{border-style:dashed;}.ccb.child{border-style:dotted;}
.ccb-n{font-size:16px;font-weight:700;}.ccb-s{font-size:10px;color:var(--txt2);}
.ca{border:2px dashed var(--border);border-radius:var(--r);padding:2px 7px;cursor:pointer;font-size:7px;color:var(--txt3);font-weight:600;}
.ca:hover{border-color:var(--ac);color:var(--ac);}
.cvl{width:2px;height:5px;background:var(--border);margin:0 auto;}
.gw{display:flex;flex-direction:column;min-width:max-content;position:relative;}
.shr{display:flex;position:sticky;top:0;z-index:20;background:var(--card);border-bottom:2px solid var(--border);}
.shr .tc{width:4px;flex-shrink:0;}
.sh{flex:1;min-width:240px;padding:7px 10px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;border-right:1px solid var(--border);}.sh:last-child{border-right:none;}
.tgap{display:flex;height:56px;}.tgap .tc{width:4px;}.tgap-col{flex:1;min-width:240px;border-right:1px solid rgba(0,0,0,.02);}.tgap-col:last-child{border-right:none;}
.tr{display:flex;min-height:110px;position:relative;}.tr .tb{width:4px;flex-shrink:0;}
.tr .tl{position:absolute;left:7px;top:2px;font-size:9px;font-weight:700;text-transform:uppercase;opacity:0;}body.em .tl{opacity:1;}
.sc{flex:1;min-width:240px;padding:10px 6px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;justify-content:center;border-right:1px solid rgba(0,0,0,.02);}.sc:last-child{border-right:none;}
.pc{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:9px 8px;width:175px;text-align:center;cursor:pointer;transition:opacity .2s,transform .12s,box-shadow .12s;position:relative;box-shadow:var(--shadow);z-index:2;}
.pc:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.1);}
.pc.sel{border-color:var(--ac);box-shadow:0 0 0 3px rgba(156,39,66,.2);z-index:5;}
.gw.has-sel .pc:not(.sel){opacity:.4;}
.pc .ta{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;}
.pc .pw{position:relative;width:64px;height:64px;margin:2px auto 4px;}
.pc .pi{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid #eee;}
.pc .pp{width:64px;height:64px;border-radius:50%;background:#e8e6e2;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--txt3);border:3px solid #eee;}
.pc .pi.pr,.pc .pp.pr{border-color:var(--cred-color,#D4A017);box-shadow:0 0 0 2px rgba(212,160,23,.3);}
.pc .seal{position:absolute;bottom:-2px;right:-2px;width:24px;height:24px;border-radius:50%;background:#D4A017;color:#fff;font-size:7px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
.pc .pn{font-size:12px;font-weight:700;line-height:1.2;}.pc .pcr{font-size:9px;color:var(--txt3);margin-top:1px;}
.pc .pt{font-size:10px;font-weight:600;margin-top:2px;line-height:1.1;}.pc .pr2{font-size:9px;color:var(--txt2);margin-top:1px;}
.pc .ch{position:absolute;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;background:var(--ac);border:2px solid #fff;cursor:crosshair;z-index:10;display:none;}
.pc .ch-t{top:-5px;}.pc .ch-b{bottom:-5px;}
body.em .pc .ch{display:block;}
body.em.conn .pc{cursor:crosshair;}body.em.conn .pc:hover{outline:2px solid var(--blue);outline-offset:1px;}
.aph{border:2px dashed var(--border)!important;opacity:.15;cursor:pointer;display:flex;align-items:center;justify-content:center;min-height:65px;width:175px;background:transparent!important;box-shadow:none!important;}.aph:hover{opacity:.35;border-color:var(--ac)!important;}
.svg-lines{position:absolute;top:0;left:0;overflow:visible;z-index:1;pointer-events:none;}
body.em .svg-lines{pointer-events:auto;}
.svg-lines line.edge{stroke:var(--lc);stroke-width:2;pointer-events:none;}
.svg-lines line.edge-hit{stroke:transparent;stroke-width:14;pointer-events:stroke;cursor:pointer;}
.svg-lines line.edge.selected{stroke:var(--red);stroke-width:3;}
.svg-lines circle.jn{fill:var(--lc);pointer-events:none;}
.conn-bar{position:fixed;top:52px;left:50%;transform:translateX(-50%);padding:5px 14px;border-radius:0 0 6px 6px;font-size:10px;font-weight:600;z-index:250;display:none;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.2);}
.conn-bar.blue{background:var(--blue);}.conn-bar.red{background:var(--red);}
body.em .conn-bar.active{display:block;}
.fg{margin-bottom:6px;}.fg label{display:block;font-size:9px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--txt2);margin-bottom:2px;}
.fg input,.fg select,.fg textarea{width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-family:inherit;font-size:11px;color:var(--txt);background:#fafaf8;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--ac);}
.fg textarea{resize:vertical;min-height:35px;}.fg-r{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.btn{padding:4px 8px;border-radius:4px;font-family:inherit;font-size:8px;font-weight:600;cursor:pointer;border:1px solid var(--border);display:inline-flex;align-items:center;gap:3px;}
.btn-p{background:var(--ac);color:#fff;border-color:var(--ac);}.btn-d{background:var(--red);color:#fff;border-color:var(--red);}
.btn-s{background:#fff;color:var(--txt);}.btn-xs{padding:2px 4px;font-size:7px;}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}.mov.show{display:flex;}
.mod{background:var(--card);border-radius:10px;padding:16px;max-width:380px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.2);max-height:85vh;overflow-y:auto;}
.mod h3{font-size:11px;font-weight:700;color:var(--ac);margin-bottom:8px;text-transform:uppercase;}
.ma{display:flex;gap:4px;margin-top:8px;justify-content:flex-end;}
.tw{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:999;}
.tt{background:#2a2522;color:#fff;padding:6px 14px;border-radius:6px;font-size:10px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .25s;}.tt.show{opacity:1;transform:translateY(0);}
.fn{padding:10px 20px;font-size:10px;color:var(--txt3);text-align:center;font-style:italic;max-width:700px;margin:4px auto 0;}
@media print{.hdr,.esb,.bp,.tw,.aph,.eo,.ca,.ch,.conn-bar{display:none!important;}.chart{overflow:visible!important;}.app{height:auto!important;display:block!important;}.tl{opacity:0!important;}}
</style>
</head>

// RENDER SVG LINES
function renderLines(){
  var gw=$('gw');if(!gw)return;
  var old=gw.querySelector('.svg-lines');if(old)old.remove();
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('svg-lines');svg.setAttribute('width',gw.scrollWidth);svg.setAttribute('height',gw.scrollHeight);
  var gR=gw.getBoundingClientRect();
  function pos(id){var el=gw.querySelector('[data-id="'+id+'"]');if(!el)return null;var r=el.getBoundingClientRect();return{l:r.left-gR.left,r:r.right-gR.left,t:r.top-gR.top,b:r.bottom-gR.top,cx:r.left+r.width/2-gR.left};}
  // Principals bar + trunk
  var tiers=D.tiers.slice().sort(function(a,b){return a.o-b.o;});
  var prins=D.pp.filter(function(p){return p.ti===tiers[0].id;});
  var prinPos=prins.map(function(p){return pos(p.id);}).filter(Boolean);
  if(prinPos.length>1){
    var barY=Math.max.apply(null,prinPos.map(function(p){return p.b;}))+16;
    var bL=Math.min.apply(null,prinPos.map(function(p){return p.cx;}));
    var bR=Math.max.apply(null,prinPos.map(function(p){return p.cx;}));
    addSL(svg,bL,barY,bR,barY);
    prinPos.forEach(function(p){addSL(svg,p.cx,p.b,p.cx,barY);});
    var trunkX=Math.round((bL+bR)/2);
    var lastY=barY;
    for(var ti=1;ti<tiers.length;ti++){
      var tier=tiers[ti];
      var tPeople=D.pp.filter(function(p){return p.ti===tier.id;});
      var tPos=tPeople.map(function(p){return pos(p.id);}).filter(Boolean);
      if(!tPos.length)continue;
      var branchY=Math.min.apply(null,tPos.map(function(p){return p.t;}))-18;
      addSL(svg,trunkX,lastY,trunkX,branchY);
      var allX=[trunkX].concat(tPos.map(function(p){return p.cx;}));
      addSL(svg,Math.min.apply(null,allX),branchY,Math.max.apply(null,allX),branchY);
      tPos.forEach(function(p){addSL(svg,p.cx,branchY,p.cx,p.t);addJN(svg,p.cx,branchY);});
      addJN(svg,trunkX,branchY);
      lastY=branchY;
    }
  }
  // Explicit edges
  D.edges.forEach(function(e){
    var fp=pos(e.from),tp=pos(e.to);if(!fp||!tp)return;
    var isSel=selEdge===e.id;
    var fromP=gp(e.from),toP=gp(e.to);
    if(fromP&&toP&&fromP.ti===toP.ti){
      var fx=fp.cx<tp.cx?fp.r+2:fp.l-2;
      var tx=fp.cx<tp.cx?tp.l-2:tp.r+2;
      var midY=(fp.t+fp.b)/2;var midY2=(tp.t+tp.b)/2;
      addEL(svg,fx,midY,tx,midY2,e.id,isSel);
    }else{
      var gy=fp.b+Math.round((tp.t-fp.b)/2);
      addEL(svg,fp.cx,fp.b,fp.cx,gy,e.id,isSel);
      addEL(svg,fp.cx,gy,tp.cx,gy,e.id,isSel);
      addEL(svg,tp.cx,gy,tp.cx,tp.t,e.id,isSel);
    }
  });
  gw.insertBefore(svg,gw.firstChild);
}
function addSL(svg,x1,y1,x2,y2){var l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);l.classList.add('edge');svg.appendChild(l);}
function addJN(svg,x,y){var c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',3);c.classList.add('jn');svg.appendChild(c);}
function addEL(svg,x1,y1,x2,y2,eid,isSel){
  var l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.classList.add('edge');if(isSel)l.classList.add('selected');svg.appendChild(l);
  if(em){var h=document.createElementNS('http://www.w3.org/2000/svg','line');h.setAttribute('x1',x1);h.setAttribute('y1',y1);h.setAttribute('x2',x2);h.setAttribute('y2',y2);h.classList.add('edge-hit');h.addEventListener('click',function(ev){ev.stopPropagation();selectEdge(eid);});svg.appendChild(h);}
}

  if(D.creds)D.creds.forEach(function(c){h+='<div class="eti" style="background:'+c.color+';cursor:pointer" onclick="editCred(\''+c.id+'\')"><span>'+esc(c.icon)+' ('+esc(c.label)+')</span></div>';});
  h+='<button class="esb-btn" onclick="addCredM()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Credential</button>';
  h+='<h4>Add</h4><button class="esb-btn" onclick="addTierM()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Tier</button><button class="esb-btn" onclick="addSecM()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Sector</button>';
  $('esb').innerHTML=h;
}
function mvT(id,d){var s=D.tiers.slice().sort(function(a,b){return a.o-b.o;});var i=s.findIndex(function(t){return t.id===id;});var j=i+d;if(j<0||j>=s.length)return;var tmp=s[i].o;D.tiers.find(function(t){return t.id===s[i].id;}).o=s[j].o;D.tiers.find(function(t){return t.id===s[j].id;}).o=tmp;save();snap();fullRender();}
function mvS(id,d){var s=D.sectors.slice().sort(function(a,b){return a.o-b.o;});var i=s.findIndex(function(x){return x.id===id;});var j=i+d;if(j<0||j>=s.length)return;var tmp=s[i].o;D.sectors.find(function(x){return x.id===s[i].id;}).o=s[j].o;D.sectors.find(function(x){return x.id===s[j].id;}).o=tmp;save();snap();fullRender();}
function addTierM(){sMod('<h3>Add Tier</h3><div class="fg"><label>Label</label><input id="atL"></div><div class="fg"><label>Color</label><input type="color" id="atC" value="#607D8B"></div><div class="ma"><button class="btn btn-s" onclick="hMod()">Cancel</button><button class="btn btn-p" onclick="cfmTier()">Add</button></div>');}
function cfmTier(){var l=$('atL').value.trim();if(!l)return;D.tiers.push({id:uid(),lb:l,cl:$('atC').value,o:Math.max.apply(null,D.tiers.map(function(t){return t.o;}).concat([0]))+1});save();snap();hMod();fullRender();}
function addSecM(){sMod('<h3>Add Sector</h3><div class="fg"><label>Name</label><input id="asN"></div><div class="fg"><label>Color</label><input type="color" id="asC" value="#607D8B"></div><div class="ma"><button class="btn btn-s" onclick="hMod()">Cancel</button><button class="btn btn-p" onclick="cfmSec()">Add</button></div>');}
function cfmSec(){var n=$('asN').value.trim();if(!n)return;var c=$('asC').value;D.sectors.push({id:uid(),nm:n,cl:c,bg:c+'10',o:Math.max.apply(null,D.sectors.map(function(s){return s.o;}).concat([0]))+1});save();snap();hMod();fullRender();}

function editCred(id){var c=D.creds.find(function(x){return x.id===id;});if(!c)return;sMod('<h3>Edit Credential</h3><div class="fg"><label>Label</label><input id="ecL" value="'+esc(c.label)+'"></div><div class="fg"><label>Badge Text</label><input id="ecI" value="'+esc(c.icon)+'"></div><div class="fg"><label>Regex Pattern</label><input id="ecP" value="'+esc(c.pattern)+'"></div><div class="fg"><label>Color</label><input type="color" id="ecC" value="'+c.color+'"></div><div class="ma"><button class="btn btn-d btn-xs" onclick="delCred(\''+id+'\')">Delete</button><button class="btn btn-s" onclick="hMod()">Cancel</button><button class="btn btn-p" onclick="saveCred(\''+id+'\')">Save</button></div>');}
function saveCred(id){var c=D.creds.find(function(x){return x.id===id;});if(!c)return;c.label=$('ecL').value.trim()||c.label;c.icon=$('ecI').value.trim()||c.icon;c.pattern=$('ecP').value.trim()||c.pattern;c.color=$('ecC').value;save();snap();hMod();fullRender();}
function delCred(id){if(!confirm('Delete credential?'))return;D.creds=D.creds.filter(function(c){return c.id!==id;});save();snap();hMod();fullRender();}
function addCredM(){sMod('<h3>Add Credential</h3><div class="fg"><label>Label (e.g. CET)</label><input id="ecL"></div><div class="fg"><label>Badge Text</label><input id="ecI" placeholder="C.E.T."></div><div class="fg"><label>Regex Pattern</label><input id="ecP" placeholder="C\\.E\\.T"></div><div class="fg"><label>Color</label><input type="color" id="ecC" value="#2196F3"></div><div class="ma"><button class="btn btn-s" onclick="hMod()">Cancel</button><button class="btn btn-p" onclick="cfmCred()">Add</button></div>');}
function cfmCred(){var l=$('ecL').value.trim();if(!l)return;D.creds.push({id:uid(),label:l,icon:$('ecI').value.trim()||l,pattern:$('ecP').value.trim(),color:$('ecC').value});save();snap();hMod();fullRender();}
function editTier(id){var t=D.tiers.find(function(x){return x.id===id;});if(!t)return;sMod('<h3>Edit Tier</h3><div class="fg"><label>Label</label><input id="etL" value="'+esc(t.lb)+'"></div><div class="fg"><label>Color</label><input type="color" id="etC" value="'+t.cl+'"></div><div class="ma"><button class="btn btn-d btn-xs" onclick="delTier(\''+id+'\')">Delete</button><button class="btn btn-s" onclick="hMod()">Cancel</button><button class="btn btn-p" onclick="saveTier(\''+id+'\')">Save</button></div>');}
function saveTier(id){var t=D.tiers.find(function(x){return x.id===id;});if(!t)return;t.lb=$('etL').value.trim()||t.lb;t.cl=$('etC').value;save();snap();hMod();fullRender();}
function delTier(id){if(!confirm('Delete this tier?'))return;D.tiers=D.tiers.filter(function(t){return t.id!==id;});save();snap();hMod();fullRender();}
function sMod(h){$('mc').innerHTML=h;$('mov').classList.add('show');}
function hMod(){$('mov').classList.remove('show');}
$('mov').onclick=function(e){if(e.target===this)hMod();};

function fullRender(){renderLayout();renderLines();renderSB();if(!em||!selEdge)$('selBar').classList.remove('active');if(!em||!connFrom)$('connBar').classList.remove('active');}

document.addEventListener('DOMContentLoaded',function(){
  if(!load())D=defaultData();
  snap();fullRender();
  window.addEventListener('resize',function(){renderLines();});
  $('chart').addEventListener('scroll',function(){renderLines();});
  if(window.ResizeObserver){new ResizeObserver(function(){renderLines();}).observe($('chart'));}
});
</script>
