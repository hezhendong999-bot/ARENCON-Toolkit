<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#9C2742">
<title>ARENCON — Employee Onboarding Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ac:#9C2742;--ac2:#7d1f35;--bg:#F7F8FA;--card:#fff;--border:#DDE1E7;--txt:#1C2333;--txt2:#4A5568;--txt3:#A0AEC0;--yes:#1A7A4A;--yes-bg:#D4EDDA;--no:#C0392B;--no-bg:#FADBD8;--warn:#B7791F;--shadow:0 2px 12px rgba(28,35,51,.10);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);font-size:15px;}
.header{background:var(--ac);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(156,39,66,.3);}
.header img{height:36px;background:#fff;border-radius:6px;padding:4px 8px;}
.header h1{font-size:19px;font-weight:700;letter-spacing:.5px;}
.header-right{margin-left:auto;display:flex;gap:8px;}
.hbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 14px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}
.hbtn:hover{background:rgba(255,255,255,.25);}
.main{max-width:800px;margin:0 auto;padding:24px 18px 80px;}
.card{background:var(--card);border-radius:11px;box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;border:1.5px solid var(--border);}
.card-header{background:var(--ac);color:#fff;padding:13px 20px;font-weight:700;font-size:17px;letter-spacing:.5px;}
.card-header.mid{background:var(--ac2);}
.card-body{padding:20px;}
.progress-bar{height:8px;background:#e8e8e8;border-radius:4px;margin:16px 0;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--yes));border-radius:4px;transition:width .4s;}
.section-title{font-weight:700;font-size:17px;color:var(--ac);margin:24px 0 10px;display:flex;align-items:center;gap:9px;}
.section-title::before{content:'';display:inline-block;width:4px;height:19px;background:var(--ac);border-radius:2px;}
.q-card{background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:16px;margin-bottom:12px;}
.q-card.correct{border-left:4px solid var(--yes);}
.q-card.incorrect{border-left:4px solid var(--no);}
.q-text{font-size:14px;font-weight:600;margin-bottom:10px;}
.q-options{display:flex;flex-direction:column;gap:6px;}
.q-opt{padding:10px 14px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:13px;transition:all .15s;}
.q-opt:hover{border-color:var(--ac);background:rgba(156,39,66,.03);}
.q-opt.selected{border-color:var(--ac);background:rgba(156,39,66,.08);font-weight:600;}
.q-opt.correct-answer{border-color:var(--yes);background:var(--yes-bg);}
.q-opt.wrong-answer{border-color:var(--no);background:var(--no-bg);}
.q-result{font-size:12px;font-weight:700;margin-top:8px;padding:6px 10px;border-radius:5px;}
.btn{padding:10px 20px;border-radius:7px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;}
.btn-primary{background:var(--ac);color:#fff;}.btn-primary:hover{background:var(--ac2);}
.btn-outline{background:#fff;color:var(--txt);border:1.5px solid var(--border);}.btn-outline:hover{background:var(--bg);}
.summary{padding:20px;text-align:center;}
.score{font-size:48px;font-weight:800;color:var(--ac);}
.score-label{font-size:14px;color:var(--txt2);}
.employee-info{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.employee-info label{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--txt3);display:block;margin-bottom:4px;}
.employee-info input{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;}
.footer{background:#1C2333;color:rgba(255,255,255,.4);padding:24px;text-align:center;font-size:11px;}
.toast{position:fixed;bottom:18px;right:18px;background:var(--yes);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .4s;pointer-events:none;}
.toast.show{opacity:1;}
/* Dark mode */
body.dark-mode{--bg:#1b1e24;--card:#22252d;--border:#33373f;--txt:#d4d4d4;--txt2:#8a90a0;--txt3:#5a6070;}
body.dark-mode .header{background:#2a1520;}
body.dark-mode .card-header{background:#2a1520;}
body.dark-mode .card-header.mid{background:#2a3040;}
body.dark-mode .q-opt{background:var(--card);color:var(--txt);}
body.dark-mode .employee-info input{background:#1e2028;color:#d4d4d4;border-color:#33373f;}
body.dark-mode .footer{background:#14161a;}
@media(max-width:600px){.employee-info{grid-template-columns:1fr;}}
</style>
</head>

<script>
// ═══ QUIZ DATA ═══
const SECTIONS = [
  {
    id: 'company', title: '1. Company Overview',
    questions: [
      { q: 'What industry does ARENCON specialize in?', opts: ['Electrical engineering', 'Fire protection engineering', 'Structural engineering', 'HVAC design'], ans: 1 },
      { q: 'Where is ARENCON\'s office located?', opts: ['Toronto, ON', 'Mississauga, ON', 'Brampton, ON', 'Vaughan, ON'], ans: 1 },
      { q: 'Which of the following is a core service provided by ARENCON?', opts: ['Landscape architecture', 'Fire alarm system design', 'Plumbing design', 'Elevator maintenance'], ans: 1 },
    ]
  },
  {
    id: 'safety', title: '2. Workplace Safety',
    questions: [
      { q: 'What should you do first when arriving at a construction site?', opts: ['Start working immediately', 'Sign in and put on PPE', 'Find the coffee station', 'Call your supervisor'], ans: 1 },
      { q: 'What does PPE stand for?', opts: ['Personal Performance Equipment', 'Personal Protective Equipment', 'Professional Protection Essentials', 'Protective Personnel Equipment'], ans: 1 },
      { q: 'If you see a safety hazard on site, what should you do?', opts: ['Ignore it if it\'s not your area', 'Report it immediately to your supervisor', 'Fix it yourself without telling anyone', 'Wait until the next safety meeting'], ans: 1 },
    ]
  },
  {
    id: 'codes', title: '3. Fire Protection Basics',
    questions: [
      { q: 'What NFPA standard covers the installation of sprinkler systems?', opts: ['NFPA 13', 'NFPA 25', 'NFPA 72', 'NFPA 101'], ans: 0 },
      { q: 'What NFPA standard covers fire alarm systems?', opts: ['NFPA 13', 'NFPA 20', 'NFPA 72', 'NFPA 25'], ans: 2 },
      { q: 'What does AHJ stand for?', opts: ['Authority Having Jurisdiction', 'Authorized Health Judge', 'Area Hazard Justification', 'Assessment of Hazardous Junctions'], ans: 0 },
    ]
  },
  {
    id: 'tools', title: '4. ARENCON Toolkit',
    questions: [
      { q: 'How do you access the ARENCON Toolkit?', opts: ['Download from the App Store', 'Open the index.html portal in a browser', 'Request access from IT', 'It\'s only available on company computers'], ans: 1 },
      { q: 'What format does the toolkit use for saving field data?', opts: ['Excel spreadsheets', 'PDF forms', 'JSON auto-save to localStorage', 'Paper forms only'], ans: 2 },
      { q: 'What should you do before starting a fire pump commissioning test?', opts: ['Run the pump at full speed immediately', 'Complete Section 1 (Pre-Test) checklist items first', 'Skip to the performance test', 'Call the office for instructions'], ans: 1 },
    ]
  },
  {
    id: 'procedures', title: '5. Company Procedures',
    questions: [
      { q: 'How should you submit a completed field report?', opts: ['Print and mail it', 'Save JSON and share via OneDrive/Teams', 'Email a screenshot', 'Leave it on the shared drive'], ans: 1 },
      { q: 'Who should you contact for technical questions about a project?', opts: ['The client directly', 'The project engineer of record', 'Google it', 'Another contractor on site'], ans: 1 },
      { q: 'What is the proper way to document a deficiency found during inspection?', opts: ['Take a mental note', 'Record in the deficiency section with photos, description, and status', 'Tell the contractor verbally', 'Write it on a sticky note'], ans: 1 },
    ]
  }
];

// ═══ STATE ═══
const SAVE_KEY = 'arencon_onboarding_quiz';
let answers = {}; // { 'company_0': 2, 'safety_1': 0, ... }
let submitted = {};

function showToast(msg) {
  const t = document.getElementById('toast-el');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══ RENDER ═══
function renderQuiz() {
  const container = document.getElementById('quiz-container');
  let html = '';
  SECTIONS.forEach(sec => {
    html += `<div class="section-title">${sec.title}</div>`;
    sec.questions.forEach((q, qi) => {
      const key = sec.id + '_' + qi;
      const userAns = answers[key];
      const isSub = submitted[key];
      const isCorrect = isSub && userAns === q.ans;
      const isWrong = isSub && userAns !== q.ans;
      html += `<div class="q-card${isCorrect ? ' correct' : ''}${isWrong ? ' incorrect' : ''}">`;
      html += `<div class="q-text">${qi + 1}. ${q.q}</div>`;
      html += `<div class="q-options">`;
      q.opts.forEach((opt, oi) => {
        let cls = 'q-opt';
        if (userAns === oi) cls += ' selected';
        if (isSub && oi === q.ans) cls += ' correct-answer';
        if (isSub && userAns === oi && oi !== q.ans) cls += ' wrong-answer';
        const disabled = isSub ? 'style="pointer-events:none;"' : '';
        html += `<div class="${cls}" ${disabled} onclick="selectAnswer('${key}',${oi})">${String.fromCharCode(65 + oi)}) ${opt}</div>`;
      });
      html += `</div>`;
      if (!isSub && userAns !== undefined) {
        html += `<div style="margin-top:8px;"><button class="btn btn-primary" style="padding:6px 16px;font-size:12px;" onclick="submitAnswer('${key}')">Submit</button></div>`;
      }
      if (isSub) {
        html += `<div class="q-result" style="background:${isCorrect ? 'var(--yes-bg);color:var(--yes)' : 'var(--no-bg);color:var(--no)'};">${isCorrect ? '✓ Correct!' : '✗ Incorrect — correct answer: ' + String.fromCharCode(65 + q.ans)}</div>`;
      }
      html += `</div>`;
    });
  });
  container.innerHTML = html;
  updateProgress();
  autoSave();
}

function selectAnswer(key, optIdx) {
  if (submitted[key]) return;
  answers[key] = optIdx;
  renderQuiz();
}

function submitAnswer(key) {
  submitted[key] = true;
  renderQuiz();
  // Check if all done
  const total = SECTIONS.reduce((s, sec) => s + sec.questions.length, 0);
  const done = Object.keys(submitted).length;
  if (done >= total) showSummary();
}

function updateProgress() {
  const total = SECTIONS.reduce((s, sec) => s + sec.questions.length, 0);
  const done = Object.keys(submitted).length;
  const correct = Object.keys(submitted).filter(k => {
    const [secId, qi] = k.split('_');
    const sec = SECTIONS.find(s => s.id === secId);
    return sec && answers[k] === sec.questions[parseInt(qi)].ans;
  }).length;
  document.getElementById('prog-text').textContent = done + ' / ' + total + (done > 0 ? ' (' + correct + ' correct)' : '');
  document.getElementById('prog-fill').style.width = (total > 0 ? (done / total * 100) : 0) + '%';
}

function showSummary() {
  const total = SECTIONS.reduce((s, sec) => s + sec.questions.length, 0);
  const correct = Object.keys(submitted).filter(k => {
    const [secId, qi] = k.split('_');
    const sec = SECTIONS.find(s => s.id === secId);
    return sec && answers[k] === sec.questions[parseInt(qi)].ans;
  }).length;
  const pct = Math.round(correct / total * 100);
  document.getElementById('final-score').textContent = pct + '%';
  // Per-section breakdown
  let sh = '';
  SECTIONS.forEach(sec => {
    const sq = sec.questions.length;
    const sc = sec.questions.filter((q, qi) => submitted[sec.id + '_' + qi] && answers[sec.id + '_' + qi] === q.ans).length;
    sh += `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;"><span>${sec.title}</span><span style="font-weight:700;color:${sc === sq ? 'var(--yes)' : 'var(--no)'};">${sc}/${sq}</span></div>`;
  });
  document.getElementById('section-scores').innerHTML = sh;
  document.getElementById('summary-card').style.display = '';
}

function resetQuiz() {
  if (!confirm('Reset all answers?')) return;
  answers = {}; submitted = {};
  document.getElementById('summary-card').style.display = 'none';
  renderQuiz();
  showToast('Quiz reset');
}

// ═══ SAVE / LOAD ═══
function autoSave() {
  const state = {
    answers, submitted,
    emp: {
      name: document.getElementById('emp-name').value,
      title: document.getElementById('emp-title').value,
      date: document.getElementById('emp-date').value,
      super: document.getElementById('emp-super').value
    }
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {}
}

function loadSaved() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.answers) answers = s.answers;
    if (s.submitted) submitted = s.submitted;
    if (s.emp) {
      document.getElementById('emp-name').value = s.emp.name || '';
      document.getElementById('emp-title').value = s.emp.title || '';
      document.getElementById('emp-date').value = s.emp.date || '';
      document.getElementById('emp-super').value = s.emp.super || '';
    }
    renderQuiz();
    const total = SECTIONS.reduce((t, sec) => t + sec.questions.length, 0);
    if (Object.keys(submitted).length >= total) showSummary();
  } catch (e) {}
}

function saveToJSON() {
  autoSave();
  const raw = localStorage.getItem(SAVE_KEY);
  const blob = new Blob([raw], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ARENCON_Onboarding_' + (document.getElementById('emp-name').value || 'Quiz').replace(/\s+/g, '_') + '.json';
  a.click(); URL.revokeObjectURL(a.href);
  showToast('✓ Saved');
}

function loadFromJSON() {
  const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
  inp.onchange = function () {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = function () {
      try {
        const s = JSON.parse(r.result);
        localStorage.setItem(SAVE_KEY, JSON.stringify(s));
        loadSaved();
        showToast('✓ Loaded');
      } catch (e) { showToast('Load failed'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

function exportPDF() {
  autoSave();
  const w = window.open('', '_blank');
  const emp = {
    name: document.getElementById('emp-name').value || '—',
    title: document.getElementById('emp-title').value || '—',
    date: document.getElementById('emp-date').value || '—',
    super: document.getElementById('emp-super').value || '—'
  };
  const total = SECTIONS.reduce((s, sec) => s + sec.questions.length, 0);
  const correct = Object.keys(submitted).filter(k => {
    const [secId, qi] = k.split('_');
    const sec = SECTIONS.find(s => s.id === secId);
    return sec && answers[k] === sec.questions[parseInt(qi)].ans;
  }).length;
  let html = `<html><head><title>ARENCON Onboarding Quiz — ${emp.name}</title><style>body{font-family:Arial,sans-serif;font-size:10pt;color:#333;max-width:700px;margin:0 auto;padding:20px;} h1{color:#9C2742;font-size:16pt;} h2{color:#1C2333;font-size:12pt;border-bottom:2px solid #9C2742;padding-bottom:4px;margin-top:20px;} table{width:100%;border-collapse:collapse;margin:10px 0;} th,td{border:1px solid #ddd;padding:6px 10px;text-align:left;font-size:9pt;} th{background:#9C2742;color:#fff;} .pass{color:#1A7A4A;font-weight:bold;} .fail{color:#C0392B;font-weight:bold;}</style></head><body>`;
  html += `<h1>Employee Onboarding Quiz Results</h1>`;
  html += `<table><tr><td><strong>Employee:</strong> ${emp.name}</td><td><strong>Position:</strong> ${emp.title}</td></tr><tr><td><strong>Start Date:</strong> ${emp.date}</td><td><strong>Supervisor:</strong> ${emp.super}</td></tr><tr><td><strong>Score:</strong> ${correct}/${total} (${Math.round(correct / total * 100)}%)</td><td><strong>Date Completed:</strong> ${new Date().toLocaleDateString()}</td></tr></table>`;
  SECTIONS.forEach(sec => {
    html += `<h2>${sec.title}</h2><table><tr><th>#</th><th>Question</th><th>Answer</th><th>Result</th></tr>`;
    sec.questions.forEach((q, qi) => {
      const key = sec.id + '_' + qi;
      const ua = answers[key];
      const isC = ua === q.ans;
      html += `<tr><td>${qi + 1}</td><td>${q.q}</td><td>${ua !== undefined ? q.opts[ua] : '—'}</td><td class="${isC ? 'pass' : 'fail'}">${isC ? '✓' : '✗'}</td></tr>`;
    });
    html += `</table>`;
  });
  html += `<div style="margin-top:30px;border-top:2px solid #9C2742;padding-top:10px;display:flex;justify-content:space-between;"><div><strong>Employee Signature:</strong> ___________________</div><div><strong>Supervisor Signature:</strong> ___________________</div></div>`;
  html += `</body></html>`;
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 500);
}

// ═══ DARK MODE ═══
function toggleDark() {
  document.body.classList.toggle('dark-mode');
  localStorage.setItem('arencon_onboard_dark', document.body.classList.contains('dark-mode') ? 'true' : 'false');
}
(function () {
  var s = localStorage.getItem('arencon_onboard_dark');
  if (s === 'true' || (s === null && window.matchMedia('(prefers-color-scheme:dark)').matches)) document.body.classList.add('dark-mode');
})();

// ═══ INIT ═══
document.getElementById('emp-date').value = new Date().toISOString().slice(0, 10);
document.addEventListener('input', function () { autoSave(); });
renderQuiz();
loadSaved();
</script>
</body>
</html>
